name: CI

on:
  push:
    branches: [main, feat/auto-build]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy --strict src

      - name: Test + coverage
        run: uv run pytest -q --cov=src/tattoo_feed --cov-report=term-missing --cov-fail-under=90
